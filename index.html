<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Matchmaker AI 🍿</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-gradient-1: #fdfbfb;
            --bg-gradient-2: #ebedee;
            --text-main: #1a1a2e;
            --text-muted: #4a4a6a;
            --primary-color: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --chat-bg: rgba(255, 255, 255, 0.7);
            --chat-border: rgba(255, 255, 255, 0.5);
            --bot-msg-bg: #ffffff;
            --user-msg-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
            --user-msg-text: #ffffff;
            --chip-bg: rgba(99, 102, 241, 0.1);
            --chip-border: #6366f1;
            --chip-hover: #6366f1;
            --chip-text: #6366f1;
            --card-bg: #ffffff;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.08);
            --particle-color: rgba(99, 102, 241, 0.2);
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary-color: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --chat-bg: rgba(15, 23, 42, 0.7);
            --chat-border: rgba(255, 255, 255, 0.1);
            --bot-msg-bg: rgba(30, 41, 59, 0.9);
            --user-msg-bg: linear-gradient(135deg, #8b5cf6, #d946ef);
            --user-msg-text: #ffffff;
            --chip-bg: rgba(139, 92, 246, 0.15);
            --chip-border: #8b5cf6;
            --chip-hover: #8b5cf6;
            --chip-text: #e2e8f0;
            --card-bg: #1e293b;
            --shadow-soft: 0 15px 50px rgba(0, 0, 0, 0.4);
            --particle-color: rgba(139, 92, 246, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body {
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-1));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particles */
        #particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--particle-color);
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Header / Theme Toggle */
        header {
            position: relative;
            z-index: 10;
            padding: 2rem 5%;
            display: flex;
            justify-content: flex-end;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--chat-border);
            color: var(--text-main);
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* Hero Section */
        .hero {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70vh;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary-color), #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1s ease-out;
        }

        .hero p {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            max-width: 600px;
            animation: slideUp 1.2s ease-out;
        }

        .cta-btn {
            background: linear-gradient(135deg, var(--primary-color), #d946ef);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--primary-glow);
            transition: all 0.3s ease;
            animation: slideUp 1.4s ease-out, pulseGlow 2s infinite alternate;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 40px var(--primary-glow);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            from { box-shadow: 0 5px 20px var(--primary-glow); }
            to { box-shadow: 0 15px 40px var(--primary-glow); }
        }

        /* Chatbot UI */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-toggle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #d946ef);
            color: white;
            font-size: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px var(--primary-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .chat-toggle:hover {
            transform: scale(1.1) rotate(10deg);
        }
        .chat-toggle .fa-times {
            display: none;
        }
        .chat-widget.open .chat-toggle .fa-comment-dots { display: none; }
        .chat-widget.open .chat-toggle .fa-times { display: block; transform: rotate(-10deg); }

        .chat-container {
            width: 400px;
            height: 600px;
            max-height: 80vh;
            max-width: calc(100vw - 40px);
            background: var(--chat-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--chat-border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom right;
        }

        .chat-widget.open .chat-container {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.03);
            border-bottom: 1px solid var(--chat-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
            position: relative;
        }
        .bot-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            border: 2px solid var(--chat-bg);
        }

        .chat-header-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .chat-header-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary-glow);
            border-radius: 10px;
        }

        .msg-row {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: messagePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            0% { opacity: 0; transform: translateY(15px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-bot { align-self: flex-start; }
        .msg-user { align-self: flex-end; align-items: flex-end; }

        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .msg-bot .bubble {
            background: var(--bot-msg-bg);
            color: var(--text-main);
            border-bottom-left-radius: 5px;
            border: 1px solid var(--chat-border);
        }

        .msg-user .bubble {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 5px;
        }

        .timestamp {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
            margin-bottom: 5px;
            padding: 0 5px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 18px;
            background: var(--bot-msg-bg);
            border-radius: 20px;
            border-bottom-left-radius: 5px;
            width: fit-content;
            border: 1px solid var(--chat-border);
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary-color);
            border-radius: 50%;
            animation: typingDot 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingDot {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Interactive Chips */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            animation: slideUp 0.5s ease;
        }

        .chip {
            background: var(--chip-bg);
            color: var(--chip-text);
            border: 1px solid var(--chip-border);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chip:hover {
            background: var(--chip-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        /* Movie Cards in Chat */
        .movie-scroller {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 5px;
            padding-bottom: 15px;
            margin-top: 10px;
            width: 320px;
            max-width: 100%;
        }
        .movie-scroller::-webkit-scrollbar {
            height: 6px;
        }
        .movie-scroller::-webkit-scrollbar-thumb {
            background: var(--primary-glow);
            border-radius: 10px;
        }

        .movie-card {
            min-width: 200px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--chat-border);
            transition: transform 0.3s ease;
            flex-shrink: 0;
            cursor: pointer;
        }
        .movie-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 30px var(--primary-glow);
        }

        .movie-poster {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 2px solid var(--primary-color);
        }

        .movie-info {
            padding: 15px;
        }
        .movie-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 5px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            font-size: 0.75rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .movie-meta span {
            background: var(--chip-bg);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .movie-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Input Area (Disabled visually as we use chips, but kept for layout) */
        .chat-input-area {
            padding: 15px 20px;
            background: rgba(0,0,0,0.02);
            border-top: 1px solid var(--chat-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--chat-border);
            background: var(--card-bg);
            color: var(--text-main);
            outline: none;
            font-size: 0.95rem;
        }
        .chat-input-area input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .chat-container {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                max-width: 100vw;
                border-radius: 0;
                bottom: 0;
                right: 0;
                margin-bottom: 0;
                position: fixed;
            }
            .chat-widget {
                bottom: 20px;
                right: 20px;
            }
            .movie-scroller {
                width: 80vw;
            }
        }
    </style>
</head>
<body>

    <!-- Background Particles -->
    <div id="particles"></div>

    <header>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
            <i class="fas fa-moon"></i> <span>Dark Mode</span>
        </button>
    </header>

    <main class="hero">
        <h1>Movie Matchmaker AI 🍿</h1>
        <p>Tired of endlessly scrolling? Let our advanced AI analyze your mood and preferences to find the perfect movie for you in seconds.</p>
        <button class="cta-btn" onclick="openChat()">
            <i class="fas fa-magic"></i> Find My Movie
        </button>
    </main>

    <!-- Chatbot Widget -->
    <div class="chat-widget" id="chatWidget">
        <div class="chat-container">
            <div class="chat-header">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="chat-header-info">
                    <h3>CineBot AI</h3>
                    <p><i class="fas fa-circle" style="color: #10b981; font-size: 0.5rem;"></i> Online & Ready</p>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be injected here via JS -->
            </div>

            <div class="chat-input-area">
                <input type="text" placeholder="Select an option above..." disabled>
            </div>
        </div>

        <div class="chat-toggle" onclick="toggleChat()">
            <i class="fas fa-comment-dots"></i>
            <i class="fas fa-times"></i>
        </div>
    </div>

    <!-- Audio element for sound effect (Base64 short pop sound) -->
    <audio id="popSound" src="data:audio/mp3;base64,//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq//NExAAAAANIAAAAAExBTUUzLjEwMKqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqq"></audio>

<script>
    // --- BACKGROUND PARTICLES ---
    function createParticles() {
        const container = document.getElementById('particles');
        const particleCount = 20;
        for (let i = 0; i < particleCount; i++) {
            let p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = `${Math.random() * 20 + 5}px`;
            p.style.height = p.style.width;
            p.style.left = `${Math.random() * 100}vw`;
            p.style.animationDuration = `${Math.random() * 10 + 10}s`;
            p.style.animationDelay = `${Math.random() * 10}s`;
            container.appendChild(p);
        }
    }
    createParticles();

    // --- THEME TOGGLE ---
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeToggle');
        const icon = btn.querySelector('i');
        const text = btn.querySelector('span');

        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fas fa-moon';
            text.textContent = 'Dark Mode';
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
            text.textContent = 'Light Mode';
        }
    }

    // --- MOVIE DATASET ---
    // Using picsum.photos with consistent seeds based on movie title for premium, reliable placeholder posters
    const generatePoster = (seed) => `https://picsum.photos/seed/${seed.replace(/\s+/g, '')}/300/450`;

    const movies = [
        { title: "Inception", genre: "Sci-Fi", language: "English", mood: "Excited", desc: "A thief who steals corporate secrets through the use of dream-sharing technology.", poster: generatePoster('InceptionDream') },
        { title: "The Matrix", genre: "Sci-Fi", language: "English", mood: "Excited", desc: "A computer hacker learns from mysterious rebels about the true nature of his reality.", poster: generatePoster('MatrixCode') },
        { title: "Interstellar", genre: "Sci-Fi", language: "English", mood: "Relaxed", desc: "A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.", poster: generatePoster('SpaceStars') },
        { title: "Koi Mil Gaya", genre: "Sci-Fi", language: "Hindi", mood: "Happy", desc: "A developmentally disabled man encounters an extraterrestrial being.", poster: generatePoster('AlienLight') },
        { title: "Ra.One", genre: "Sci-Fi", language: "Hindi", mood: "Excited", desc: "A video game developer creates an invincible antagonist that escapes into the real world.", poster: generatePoster('CyberTech') },
        
        { title: "The Hangover", genre: "Comedy", language: "English", mood: "Happy", desc: "Three buddies wake up from a bachelor party in Las Vegas, with no memory of the previous night.", poster: generatePoster('VegasParty') },
        { title: "Superbad", genre: "Comedy", language: "English", mood: "Happy", desc: "Two co-dependent high school seniors are forced to deal with separation anxiety.", poster: generatePoster('TeenFun') },
        { title: "3 Idiots", genre: "Comedy", language: "Hindi", mood: "Happy", desc: "Two friends are searching for their long lost companion in engineering college.", poster: generatePoster('CollegeDays') },
        { title: "Hera Pheri", genre: "Comedy", language: "Hindi", mood: "Happy", desc: "Three unemployed men find the answer to all their money problems when they receive a call from a kidnapper.", poster: generatePoster('TelephoneRetro') },
        { title: "Munna Bhai M.B.B.S.", genre: "Comedy", language: "Hindi", mood: "Happy", desc: "A goon sets out to fulfill his father's dream of becoming a doctor.", poster: generatePoster('DoctorStethoscope') },
        
        { title: "Mad Max: Fury Road", genre: "Action", language: "English", mood: "Excited", desc: "In a post-apocalyptic wasteland, a woman rebels against a tyrannical ruler in search for her homeland.", poster: generatePoster('DesertCar') },
        { title: "John Wick", genre: "Action", language: "English", mood: "Excited", desc: "An ex-hit-man comes out of retirement to track down the gangsters that killed his dog.", poster: generatePoster('NeonGun') },
        { title: "Pathaan", genre: "Action", language: "Hindi", mood: "Excited", desc: "An Indian spy races against time to stop a mercenary group from attacking his homeland.", poster: generatePoster('HelicopterSpy') },
        { title: "Jawan", genre: "Action", language: "Hindi", mood: "Excited", desc: "A man is driven by a personal vendetta to rectify the wrongs in society.", poster: generatePoster('MaskedHero') },
        
        { title: "The Conjuring", genre: "Horror", language: "English", mood: "Sad", desc: "Paranormal investigators work to help a family terrorized by a dark presence.", poster: generatePoster('HauntedHouse') },
        { title: "IT", genre: "Horror", language: "English", mood: "Excited", desc: "In the summer of 1989, a group of bullied kids band together to destroy a shape-shifting monster.", poster: generatePoster('RedBalloon') },
        { title: "Tumbbad", genre: "Horror", language: "Hindi", mood: "Excited", desc: "A mythological story about a goddess who created the entire universe.", poster: generatePoster('AncientGold') },
        { title: "Stree", genre: "Horror", language: "Hindi", mood: "Happy", desc: "In the small town of Chanderi, the menfolk live in fear of an evil spirit named Stree.", poster: generatePoster('DarkAlley') },
        
        { title: "La La Land", genre: "Romance", language: "English", mood: "Relaxed", desc: "While navigating their careers in Los Angeles, a pianist and an actress fall in love.", poster: generatePoster('JazzDance') },
        { title: "The Notebook", genre: "Romance", language: "English", mood: "Sad", desc: "A poor yet passionate young man falls in love with a rich young woman.", poster: generatePoster('RainKiss') },
        { title: "Dilwale Dulhania Le Jayenge", genre: "Romance", language: "Hindi", mood: "Happy", desc: "Two young non-resident Indians fall in love during a European vacation.", poster: generatePoster('TrainJourney') },
        { title: "Jab We Met", genre: "Romance", language: "Hindi", mood: "Happy", desc: "A depressed wealthy businessman finds his life changing after he meets a spunky and carefree young woman.", poster: generatePoster('MountainsIndia') }
    ];

    // --- CHATBOT LOGIC ---
    let chatOpen = false;
    let currentStep = 0;
    let userPreferences = { genre: '', language: '', mood: '' };
    const chatWidget = document.getElementById('chatWidget');
    const chatMessages = document.getElementById('chatMessages');

    function toggleChat() {
        chatOpen = !chatOpen;
        if (chatOpen) {
            chatWidget.classList.add('open');
            if (currentStep === 0) {
                setTimeout(startConversation, 300);
            }
        } else {
            chatWidget.classList.remove('open');
        }
    }

    function openChat() {
        if (!chatOpen) toggleChat();
    }

    function playSound() {
        // Fallback simple web audio API sound for premium feel
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) { console.log("Audio not supported"); }
    }

    function getTimestamp() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 50);
    }

    function addMessage(text, sender = 'bot', isHtml = false) {
        playSound();
        const row = document.createElement('div');
        row.className = `msg-row msg-${sender}`;
        
        let timeHtml = `<div class="timestamp">${getTimestamp()}</div>`;
        
        let content = isHtml ? text : text;
        let bubbleHtml = `<div class="bubble">${content}</div>`;

        if (sender === 'bot') {
            row.innerHTML = bubbleHtml + timeHtml;
        } else {
            row.innerHTML = bubbleHtml + timeHtml;
        }

        chatMessages.appendChild(row);
        scrollToBottom();
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'msg-row msg-bot';
        row.id = 'typingIndicator';
        row.innerHTML = `
            <div class="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        `;
        chatMessages.appendChild(row);
        scrollToBottom();
    }

    function removeTyping() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function renderChips(options, callback) {
        const container = document.createElement('div');
        container.className = 'chips-container msg-row msg-bot';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'chip';
            btn.innerHTML = `${opt.icon} ${opt.label}`;
            btn.onclick = () => {
                container.style.opacity = '0.5';
                container.style.pointerEvents = 'none';
                addMessage(opt.label, 'user');
                callback(opt.value);
            };
            container.appendChild(btn);
        });

        chatMessages.appendChild(container);
        scrollToBottom();
    }

    // --- CONVERSATION FLOW ---

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startConversation() {
        currentStep = 1;
        chatMessages.innerHTML = ''; // Clear old
        userPreferences = {};
        
        showTyping();
        await delay(1000);
        removeTyping();
        addMessage("Hi there! I'm CineBot, your AI Movie Matchmaker. 🍿<br>Ready to find an amazing movie?");
        
        renderChips([
            { label: "Let's Go!", value: "start", icon: "🚀" }
        ], askGenre);
    }

    async function askGenre() {
        showTyping();
        await delay(800);
        removeTyping();
        addMessage("Awesome! What kind of genre are you in the mood for?");
        
        renderChips([
            { label: "Action", value: "Action", icon: "💥" },
            { label: "Comedy", value: "Comedy", icon: "😂" },
            { label: "Horror", value: "Horror", icon: "👻" },
            { label: "Romance", value: "Romance", icon: "❤️" },
            { label: "Sci-Fi", value: "Sci-Fi", icon: "👽" }
        ], (val) => { userPreferences.genre = val; askLanguage(); });
    }

    async function askLanguage() {
        showTyping();
        await delay(800);
        removeTyping();
        addMessage(`Great choice! ${userPreferences.genre} it is. Which language do you prefer?`);
        
        renderChips([
            { label: "English", value: "English", icon: "🇺🇸" },
            { label: "Hindi", value: "Hindi", icon: "🇮🇳" }
        ], (val) => { userPreferences.language = val; askMood(); });
    }

    async function askMood() {
        showTyping();
        await delay(800);
        removeTyping();
        addMessage(`Got it! Lastly, how are you feeling right now?`);
        
        renderChips([
            { label: "Happy", value: "Happy", icon: "😊" },
            { label: "Sad", value: "Sad", icon: "😢" },
            { label: "Excited", value: "Excited", icon: "🤩" },
            { label: "Relaxed", value: "Relaxed", icon: "☕" }
        ], (val) => { userPreferences.mood = val; fetchRecommendations(); });
    }

    async function fetchRecommendations() {
        showTyping();
        await delay(1500); // Simulate AI thinking
        removeTyping();
        
        // Smart Filtering Algorithm
        let scoredMovies = movies.map(movie => {
            let score = 0;
            if (movie.genre === userPreferences.genre) score += 3;
            if (movie.language === userPreferences.language) score += 2;
            if (movie.mood === userPreferences.mood) score += 1;
            return { ...movie, score };
        });

        // Sort by score descending
        scoredMovies.sort((a, b) => b.score - a.score);
        
        // Get top 3
        const topMatches = scoredMovies.slice(0, 3);

        if (topMatches[0].score === 6) {
            addMessage("Perfect match found! Based on your exact preferences, here are my top picks for you:", "bot");
        } else {
            addMessage("I couldn't find an *exact* match for all 3 criteria, but here are the absolute closest recommendations I found for you:", "bot");
        }

        renderMovieCards(topMatches);

        // Offer Restart
        setTimeout(() => {
            renderChips([
                { label: "Try Again", value: "restart", icon: "🔄" }
            ], startConversation);
        }, 1000);
    }

    function renderMovieCards(movieList) {
        let scrollerHtml = `<div class="movie-scroller">`;
        
        movieList.forEach(m => {
            scrollerHtml += `
                <div class="movie-card" onclick="alert('Playing trailer for ${m.title}...')">
                    <img src="${m.poster}" alt="${m.title}" class="movie-poster" onerror="this.src='https://via.placeholder.com/300x450/6366f1/ffffff?text=Movie'">
                    <div class="movie-info">
                        <div class="movie-title">${m.title}</div>
                        <div class="movie-meta">
                            <span>${m.genre}</span>
                            <span>${m.language}</span>
                        </div>
                        <div class="movie-desc">${m.desc}</div>
                    </div>
                </div>
            `;
        });
        
        scrollerHtml += `</div>`;
        addMessage(scrollerHtml, 'bot', true);
    }

</script>
