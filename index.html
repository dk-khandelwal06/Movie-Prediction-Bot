<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation Chatbot</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --user-msg-gradient: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            --bot-msg-bg: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .background-text {
            text-align: center;
            opacity: 0.8;
        }

        .background-text h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .background-text p {
            font-size: 1.2rem;
        }

        /* Chat Button (Floating) */
        #chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        #chat-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Chat Window (Glassmorphism) */
        #chat-window {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 380px;
            height: 600px;
            max-height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 999;
        }

        #chat-window.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /* Header */
        .chat-header {
            background: rgba(0, 0, 0, 0.15);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-header h3 {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 10px;
            transition: transform 0.2s;
        }

        .header-actions button:hover {
            transform: scale(1.2);
        }

        /* Messages Area */
        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-body::-webkit-scrollbar {
            width: 6px;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            animation: fadeIn 0.3s ease forwards;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg-gradient);
            color: var(--text-color);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .timestamp {
            display: block;
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.6;
            text-align: right;
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: none;
            gap: 5px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #764ba2;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Quick Replies / Chips */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .reply-chip {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .reply-chip:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        /* Movie Card Formatting inside Chat */
        .movie-card {
            background: rgba(0,0,0,0.04);
            border-left: 4px solid #764ba2;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            text-align: left;
        }

        .movie-card h4 {
            color: #553c7a;
            margin-bottom: 5px;
            font-size: 1.05rem;
        }

        .movie-tags {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .movie-desc {
            font-size: 0.85rem;
            color: #444;
        }

        /* Footer Input */
        .chat-footer {
            padding: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }

        .chat-footer input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            outline: none;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }
        
        .chat-footer input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .chat-footer button {
            background: white;
            color: #764ba2;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .chat-footer button:hover {
            transform: scale(1.05);
        }

        .chat-footer button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            #chat-window {
                width: 90vw;
                height: 75vh;
                right: 5vw;
                bottom: 90px;
            }
            #chat-btn {
                right: 5vw;
                bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Content for aesthetic -->
    <div class="background-text">
        <h1>Movie Matchmaker 🍿</h1>
        <p>Your AI assistant for finding the perfect watch.</p>
        <p style="font-size: 0.9rem; margin-top: 20px; opacity: 0.7;">Click the chat icon on the bottom right to start!</p>
    </div>

    <!-- Floating Chat Button -->
    <div id="chat-btn" onclick="toggleChat()">
        🎬
    </div>

    <!-- Chat Window -->
    <div id="chat-window">
        <!-- Header -->
        <div class="chat-header">
            <h3>🤖 CineBot</h3>
            <div class="header-actions">
                <button onclick="restartChat()" title="Restart Chat">🔄</button>
                <button onclick="toggleChat()" title="Close">✖</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="chat-body" id="chat-body">
            <!-- Messages will be injected here via JS -->
            
            <!-- Typing Indicator (Hidden by default) -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-footer">
            <input type="text" id="user-input" placeholder="Type or select an option..." onkeypress="handleEnter(event)">
            <button id="send-btn" onclick="handleSendClick()">➤</button>
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        // 1. Movie Dataset (20 Movies)
        const moviesDataset = [
            { name: "The Dark Knight", genre: "Action", language: "English", mood: "Excited", desc: "Batman faces the Joker in a psychological and physical battle for Gotham City." },
            { name: "Inception", genre: "Sci-Fi", language: "English", mood: "Excited", desc: "A skilled thief steals corporate secrets through the use of dream-sharing technology." },
            { name: "3 Idiots", genre: "Comedy", language: "Hindi", mood: "Happy", desc: "Two friends search for their long lost companion, revisiting college memories." },
            { name: "The Conjuring", genre: "Horror", language: "English", mood: "Excited", desc: "Paranormal investigators work to help a family terrorized by a dark presence." },
            { name: "Sholay", genre: "Action", language: "Hindi", mood: "Excited", desc: "Two ex-convicts are hired by a retired police officer to capture a ruthless dacoit." },
            { name: "The Notebook", genre: "Romance", language: "English", mood: "Sad", desc: "A poor yet passionate young man falls in love with a rich young woman." },
            { name: "Dilwale Dulhania Le Jayenge", genre: "Romance", language: "Hindi", mood: "Happy", desc: "A young couple falls in love during a vacation across Europe." },
            { name: "Tumbbad", genre: "Horror", language: "Hindi", mood: "Excited", desc: "A mythological story about a goddess who created the entire universe and her greed." },
            { name: "Interstellar", genre: "Sci-Fi", language: "English", mood: "Sad", desc: "Explorers travel through a wormhole in space to ensure humanity's survival." },
            { name: "PK", genre: "Sci-Fi", language: "Hindi", mood: "Happy", desc: "An alien on Earth loses his communication device and questions religious dogmas." },
            { name: "Hera Pheri", genre: "Comedy", language: "Hindi", mood: "Happy", desc: "Three unemployed men look for answers to all their money problems via a wrong number." },
            { name: "The Hangover", genre: "Comedy", language: "English", mood: "Happy", desc: "Three buddies wake up from a bachelor party in Vegas with no memory of the night." },
            { name: "Titanic", genre: "Romance", language: "English", mood: "Sad", desc: "A young aristocrat falls in love with a poor artist aboard the luxurious, ill-fated R.M.S. Titanic." },
            { name: "Kabir Singh", genre: "Romance", language: "Hindi", mood: "Sad", desc: "A brilliant but destructive surgeon goes on a downward spiral after losing his love." },
            { name: "Get Out", genre: "Horror", language: "English", mood: "Excited", desc: "A young African-American visits his white girlfriend's parents, uncovering a disturbing secret." },
            { name: "Bhool Bhulaiyaa", genre: "Horror", language: "Hindi", mood: "Happy", desc: "An NRI and his wife decide to stay in his ancestral home, paying no heed to the ghost warnings." },
            { name: "Zindagi Na Milegi Dobara", genre: "Comedy", language: "Hindi", mood: "Relaxed", desc: "Three friends decide to turn their fantasy bachelor road trip into reality in Spain." },
            { name: "The Matrix", genre: "Sci-Fi", language: "English", mood: "Excited", desc: "A hacker learns from mysterious rebels about the true nature of his reality." },
            { name: "Forrest Gump", genre: "Comedy", language: "English", mood: "Relaxed", desc: "Historical events unfold from the perspective of an Alabama man with an IQ of 75." },
            { name: "Yeh Jawaani Hai Deewani", genre: "Romance", language: "Hindi", mood: "Relaxed", desc: "Kabir and Naina meet during a trekking trip where she falls in love with him." }
        ];

        // 2. Chatbot State & Flow
        let chatOpen = false;
        let currentStep = 0;
        let userPreferences = { genre: "", language: "", mood: "" };
        let isTyping = false;
        let audioCtx; // For Web Audio API (Sound Effect)

        const conversationFlow = [
            {
                key: "genre",
                question: "Hi there! 👋 I'm CineBot. Let's find a great movie for you!<br><br>What type of movie do you like?",
                options: ["Action", "Comedy", "Horror", "Romance", "Sci-Fi"]
            },
            {
                key: "language",
                question: "Awesome choice! 🍿 What is your preferred language?",
                options: ["Hindi", "English"]
            },
            {
                key: "mood",
                question: "Got it! 🗣️ Finally, what is your current mood?",
                options: ["Happy", "Sad", "Excited", "Relaxed"]
            }
        ];

        // DOM Elements
        const chatWindow = document.getElementById('chat-window');
        const chatBody = document.getElementById('chat-body');
        const typingIndicator = document.getElementById('typing-indicator');
        const inputField = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // 3. UI Functions
        function toggleChat() {
            chatOpen = !chatOpen;
            if (chatOpen) {
                chatWindow.classList.add('active');
                if (currentStep === 0 && document.querySelectorAll('.message').length === 0) {
                    startChatFlow();
                }
            } else {
                chatWindow.classList.remove('active');
            }
        }

        function playPopSound() {
            try {
                // Initialize AudioContext on first user interaction to comply with browser policies
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log("Audio not supported or blocked.");
            }
        }

        function getCurrentTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatBody.scrollTop = chatBody.scrollHeight;
            }, 50);
        }

        function setTyping(status) {
            isTyping = status;
            typingIndicator.style.display = status ? 'flex' : 'none';
            inputField.disabled = status;
            sendBtn.disabled = status;
            if (status) scrollToBottom();
        }

        function appendMessage(sender, text, isHTML = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'bot' ? 'bot-message' : 'user-message');
            
            const content = isHTML ? text : text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            msgDiv.innerHTML = `${content} <span class="timestamp">${getCurrentTime()}</span>`;
            
            // Insert before typing indicator
            chatBody.insertBefore(msgDiv, typingIndicator);
            scrollToBottom();
            
            if (sender === 'user') playPopSound();
        }

        function appendQuickReplies(options) {
            const container = document.createElement('div');
            container.classList.add('quick-replies');
            container.id = 'current-replies';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.classList.add('reply-chip');
                btn.innerText = opt;
                btn.onclick = () => handleUserInput(opt);
                container.appendChild(btn);
            });

            chatBody.insertBefore(container, typingIndicator);
            scrollToBottom();
        }

        function removeQuickReplies() {
            const replies = document.getElementById('current-replies');
            if (replies) replies.remove();
        }

        // 4. Core Logic
        function startChatFlow() {
            setTyping(true);
            setTimeout(() => {
                setTyping(false);
                askQuestion();
            }, 1000);
        }

        function askQuestion() {
            if (currentStep < conversationFlow.length) {
                const stepData = conversationFlow[currentStep];
                appendMessage('bot', stepData.question, true);
                appendQuickReplies(stepData.options);
                inputField.focus();
            } else {
                generateRecommendations();
            }
        }

        function handleUserInput(text) {
            if (isTyping) return;
            text = text.trim();
            if (!text) return;

            // Remove quick replies and clear input
            removeQuickReplies();
            inputField.value = '';
            
            // Show user message
            appendMessage('user', text);

            // Validate Input against current step options
            if (currentStep < conversationFlow.length) {
                const stepData = conversationFlow[currentStep];
                const validOptions = stepData.options.map(o => o.toLowerCase());
                
                if (validOptions.includes(text.toLowerCase())) {
                    // Match found
                    const matchedOption = stepData.options.find(o => o.toLowerCase() === text.toLowerCase());
                    userPreferences[stepData.key] = matchedOption;
                    currentStep++;
                    
                    setTyping(true);
                    setTimeout(() => {
                        setTyping(false);
                        askQuestion();
                    }, 1000);
                } else {
                    // Invalid input fallback
                    setTyping(true);
                    setTimeout(() => {
                        setTyping(false);
                        appendMessage('bot', "Oops! I didn't quite catch that. Please select one of the options or type a valid choice. 😅");
                        appendQuickReplies(stepData.options);
                    }, 800);
                }
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') handleSendClick();
        }

        function handleSendClick() {
            handleUserInput(inputField.value);
        }

        function restartChat() {
            chatBody.innerHTML = '';
            chatBody.appendChild(typingIndicator);
            currentStep = 0;
            userPreferences = { genre: "", language: "", mood: "" };
            inputField.value = '';
            startChatFlow();
        }

        // 5. Smart Recommendation Engine
        function generateRecommendations() {
            setTyping(true);
            
            setTimeout(() => {
                setTyping(false);
                
                const { genre, language, mood } = userPreferences;
                
                // 1st Pass: Exact match for all 3
                let matches = moviesDataset.filter(m => 
                    m.genre === genre && m.language === language && m.mood === mood
                );

                let matchType = "exact";

                // 2nd Pass: Match Genre & Language (Fallback 1)
                if (matches.length === 0) {
                    matches = moviesDataset.filter(m => m.genre === genre && m.language === language);
                    matchType = "partial-lang";
                }

                // 3rd Pass: Match Genre only (Fallback 2)
                if (matches.length === 0) {
                    matches = moviesDataset.filter(m => m.genre === genre);
                    matchType = "partial-genre";
                }

                // Shuffle and limit to 3 recommendations
                matches = matches.sort(() => 0.5 - Math.random()).slice(0, 3);

                // Build HTML Response
                let responseHTML = `Here are some recommendations tailored for you! 🎬✨<br>`;
                
                if (matchType !== "exact") {
                    responseHTML = `I couldn't find an exact match for all your preferences, but based on your love for <b>${genre}</b>, you might enjoy these: 🍿<br>`;
                }

                if (matches.length > 0) {
                    matches.forEach(movie => {
                        responseHTML += `
                            <div class="movie-card">
                                <h4>${movie.name}</h4>
                                <div class="movie-tags">${movie.genre} | ${movie.language} | ${movie.mood}</div>
                                <div class="movie-desc">${movie.desc}</div>
                            </div>
                        `;
                    });
                    responseHTML += `<br>Enjoy your movie time! Let me know if you want to start over. 🍿🥤`;
                } else {
                    responseHTML = `I'm so sorry! 😔 My database is empty for that combination. Try restarting and picking different options!`;
                }

                appendMessage('bot', responseHTML, true);
                
                // Add a specific quick reply to restart
                appendQuickReplies(["Restart Chat 🔄"]);
                // Override the click handler for this specific end-state button
                const finalBtn = document.querySelector('.quick-replies .reply-chip');
                if(finalBtn) {
                    finalBtn.onclick = () => {
                        removeQuickReplies();
                        restartChat();
                    };
                }

            }, 2000); // 2 seconds of "calculating" typing animation
        }

    </script>
</body>
</html>
